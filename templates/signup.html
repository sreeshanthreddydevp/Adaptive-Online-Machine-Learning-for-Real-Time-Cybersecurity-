<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - CYBER-ML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/adaptive_cybersecurity_ml.css') }}">
</head>
<body>

    <!-- Auth Section -->
    <div class="auth-container">
        <div class="auth-card auth-card-wide">
            <div class="auth-logo">
                <div class="auth-logo-icon"><i class="fas fa-user-shield"></i></div>
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join CYBER-ML and start protecting your infrastructure.</p>
            </div>

            {% if message %}
            <div class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-circle"></i> {{ message }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('signup') }}" id="signupForm">
                <!-- Username and Full Name Row -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="user" class="form-control-cyber"
                                placeholder="Choose a username" required autocomplete="username">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="fullname">Full Name</label>
                            <input type="text" id="fullname" name="name" class="form-control-cyber"
                                placeholder="Enter your full name" required autocomplete="name">
                        </div>
                    </div>
                </div>

                <!-- Email and Mobile Row -->
                <div class="row g-3">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control-cyber" 
                                placeholder="your@email.com" required autocomplete="email">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label for="mobile">Mobile Number</label>
                            <input type="tel" id="mobile" name="mobile" class="form-control-cyber"
                                placeholder="+1 (555) 000-0000" required autocomplete="tel">
                        </div>
                    </div>
                </div>

                <!-- Password Row -->
                <div class="row g-3">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div style="position:relative;">
                                <input type="password" id="password" name="password" class="form-control-cyber"
                                    placeholder="Create a strong password" required autocomplete="new-password">
                                <button type="button" onclick="togglePassword('password')"
                                    style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);cursor:pointer;font-size:0.9rem;">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

              
                <button type="submit" class="btn-cyber">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <p style="text-align:center;font-size:0.875rem;padding-top: 20px; color:var(--text-2);margin-bottom:1.5rem;">
                Already a member? <a href="{{ url_for('signin') }}" class="form-link">Sign in instead</a>
            </p>

            <div style="text-align:center;padding-top:1rem;border-top:1px solid var(--border);">
                <a href="{{ url_for('index') }}" class="form-link" style="display:inline-flex;align-items:center;gap:6px;">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
